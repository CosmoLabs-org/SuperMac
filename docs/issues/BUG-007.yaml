title: config.json is dead code never read at runtime
description: config.json defines default_settings (screenshot_location, volume_step, brightness_step, etc) but get_config() in utils.sh:429 is never called by any module. All modules hardcode defaults. Users who edit config.json see zero effect.
fix_direction: Either connect get_config() to modules so they read defaults from config, or remove config.json and get_config() to avoid misleading users. If keeping, add mac config command.
affected_files:
    - lib/utils.sh
    - config/config.json
