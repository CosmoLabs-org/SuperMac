title: dev.sh CPU comparison uses string ordering broken for values >= 10%
description: dev.sh:281-283 uses [[ $cpu > 5.0 ]] which is lexicographic string comparison, not numeric. 10.0 > 5.0 is false because 1 < 5 in ASCII. CPU color highlighting broken for any process using 10%+ CPU. dev_memory_hogs() at line 303 correctly uses bc -l.
fix_direction: 'Replace with bc -l comparison: if (( $(echo "$cpu > 5.0" | bc -l) )); then'
affected_files:
    - lib/dev.sh
