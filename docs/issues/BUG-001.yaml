title: rm -rf /tmp/* in system cleanup breaks running applications
description: lib/system.sh:173 runs rm -rf /tmp/* during cleanup. /tmp contains Unix sockets, PID files, temp databases for running apps. Deleting all contents crashes apps and corrupts data.
fix_direction: 'Replace rm -rf /tmp/* with targeted cleanup using find with user/age filters: find ${TMPDIR:-/tmp} -type f -user $USER -atime +7 -delete'
affected_files:
    - lib/system.sh
