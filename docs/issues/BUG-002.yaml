title: Airport binary never found - WiFi features silently degraded
description: wifi.sh uses command_exists airport which checks PATH. The airport binary lives at /System/Library/PrivateFrameworks/Apple80211.framework/Versions/Current/Resources/airport - NOT on default PATH. command_exists always fails, silently disabling WiFi scan, signal strength, BSSID, channel info.
fix_direction: 'Use full path: /System/Library/PrivateFrameworks/Apple80211.framework/Versions/Current/Resources/airport. Check with [[ -x $path ]] instead of command_exists.'
affected_files:
    - lib/wifi.sh
