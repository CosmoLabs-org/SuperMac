title: Wrong memory statistics on Apple Silicon (page size hardcoded 4096)
description: system.sh memory functions hardcode page_size=4096. Apple Silicon M1/M2/M3/M4 use 16KB pages (16384 bytes). All memory stats displayed by mac system memory are 4x too low on the most common modern Macs.
fix_direction: Replace hardcoded page_size=4096 with page_size=$(sysctl -n hw.pagesize)
affected_files:
    - lib/system.sh
