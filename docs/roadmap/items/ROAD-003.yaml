title: 'Phase 2: Quality'
description: |-
    Quality improvements for Bash version. Most of this will be superseded by the Go rewrite.

    Deliverables:
    1. Split utils.sh god file (589 lines, 8 responsibilities) into focused files: colors.sh, output.sh, validation.sh, interaction.sh, loader.sh
    2. Add module auto-discovery — replace hardcoded CATEGORIES with runtime scan of lib/*.sh
    3. Add --yes flag for non-interactive use (bypass confirm() prompts)
    4. Consolidate boolean parsing — shared parse_boolean() in utils.sh
    5. Add install integrity verification (SHA256 checksums for downloads)
    6. Improve uninstall (confirmation prompt, config backup, PATH cleanup)
    7. Fix documentation accuracy (remove non-existent commands from README)

    NOTE: If Go rewrite is actively being built, most of Phase 2 is not worth doing in Bash. The Go rewrite solves all of these by design (module interface, Cobra flags, single binary, proper testing). Recommend: skip unless Bash version needs long-term maintenance.
    Estimated effort: Large (1 week)
