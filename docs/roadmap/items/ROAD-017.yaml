title: 'Go Rewrite: Foundation'
description: |-
    Scaffold the Go project with Cobra CLI framework, module interface, registry, config system, output formatting, and platform abstraction layer. This is the foundation all modules build on. Must be done first before any module porting begins.

    Key deliverables:
    - go.mod with dependencies (cobra, yaml.v3, semver)
    - internal/module/module.go: Module interface (Name, ShortDescription, Commands)
    - internal/module/registry.go: Auto-discovery via init() blank imports
    - internal/config/config.go: YAML config loader, first-run defaults, get/set/edit
    - internal/output/output.go: Writer interface (Info, Success, Warning, Error, Header, Table, JSON)
    - internal/output/colors.go: ANSI helpers with NO_COLOR and non-TTY detection
    - internal/platform/: macOS abstraction layer (osascript, defaults, airport, system_profiler)
    - internal/version/version.go: Single source of truth, ldflags-stamped
    - cmd/mac/main.go: Cobra root command wiring all pieces together
    - Makefile: build, test, lint, install targets
    - config.example.yaml: Documented sample config

    Dependencies: Phase 0 critical fixes (ROAD-001) should be complete so Bash version is stable as reference.
    Estimated effort: Large (3-5 days for one person, parallelizable with agents)
status: promoted
